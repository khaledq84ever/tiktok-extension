<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TikGet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/popup.css" />
</head>
<body>
  <div class="shell">

    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43V8.94a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.84-.37z"/>
          </svg>
        </div>
        <span class="brand-name">TikGet</span>
      </div>
      <span class="version-badge">v1.0</span>
    </header>

    <p class="hint">Download buttons appear automatically on every video while you browse <strong>TikTok</strong>. No watermark.</p>

    <div class="divider"><span>or paste a TikTok URL</span></div>

    <div class="input-wrap">
      <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <input id="urlInput" type="url" placeholder="https://www.tiktok.com/@user/video/…" autocomplete="off" spellcheck="false" />
    </div>

    <div id="errorBox" class="error-box" style="display:none"></div>

    <button id="fetchBtn" class="fetch-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Get Video
    </button>

    <div id="resultCard" class="result-card" style="display:none">
      <div class="result-thumb-row">
        <div class="result-info">
          <div id="resultTitle" class="result-title"></div>
          <div id="resultMeta" class="result-meta"></div>
        </div>
      </div>
      <div id="actionRow" class="action-row"></div>
    </div>

    <div id="progressWrap" class="progress-wrap" style="display:none">
      <div class="progress-track">
        <div id="progressBar" class="progress-fill"></div>
      </div>
      <div id="progressLabel" class="progress-label">Starting…</div>
    </div>

    <footer class="footer">
      <span class="footer-credit">
        Programmed By
        <a href="https://x.com/KhaledQ84Ever" target="_blank" rel="noopener noreferrer" class="footer-link">@KhaledQ84Ever</a>
      </span>
    </footer>

  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
